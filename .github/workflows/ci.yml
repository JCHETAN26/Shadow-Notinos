name: CI

on:
  pull_request:
    branches: [main]
  # Manual re-runs; avoids a red check on the empty genesis commit while still
  # allowing post-merge verification on demand.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @shadow/api db:generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

  db:
    name: Prisma migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: shadow
          POSTGRES_PASSWORD: shadow
          POSTGRES_DB: shadow_notino
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shadow -d shadow_notino"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://shadow:shadow@localhost:5432/shadow_notino?schema=public
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm --filter @shadow/api exec prisma migrate deploy
